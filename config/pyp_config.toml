[tabs.tomo_mem]
_name = "Tomogram segmentation"
_description = "Parameters for tomogram segmentation"

[tabs.tomo_mem.use_denoised]
name = "Use denoised"
description = "Use denoised tomograms if available"
type = "bool"
default = true

[tabs.tomo_mem.force]
name = "Recalculate segmentation"
description = "If true, segment tomograms"
type = "bool"
default = false
hidden = true

[tabs.tomo_mem.method]
name = "Method"
description = "Segmentation method"
type = "enum"
enum = { membrain="membrain-seg (membranes)", tardis_mem="tardis (membranes)", tardis_actin="tardis (actin filaments)", tardis_mt="tardis (microtubules)" } 
default = "membrain"

[tabs.tomo_mem.tardis_mem_patch_size]
name = "Patch size"
description = "Window size used for prediction. This will break tomograms into smaller patches with 25% overlap. Smaller values than 128 consume less GPU, but also may lead to worse segmentation results!"
type = "enum"
enum = { 32="32", 64="64", 96="96", 128="128", 256="256", 512="512" }
default = "128"
condition = { arg="method", value=["tardis_mem","tardis_mt","tardis_actin"] }

[tabs.tomo_mem.tardis_mem_rotate]
name = "Use 4x rotations during prediction"
description = "This will increase prediction time 4 times. However, it usually will result in cleaner output"
type = "bool"
default = true
condition = { arg="method", value=["tardis_mem","tardis_mt","tardis_actin"] }

[tabs.tomo_mem.tardis_mem_cnn_threshold]
name = "Threshold for semantic prediction"
description = "Higher values lead to reduction in noise and membrane prediction recall. Lower values increase membrane prediction recall but may lead to increased noise"
type = "float"
default = 0.5
condition = { arg="method", value=["tardis_mem","tardis_mt","tardis_actin"] }

[tabs.tomo_mem.tardis_mem_dist_threshold]
name = "Threshold for instance prediction"
description = "Higher values give lower number of instances, lower values increase the number of predicted instances"
type = "float"
default = 0.9
condition = { arg="method", value=["tardis_mem","tardis_mt","tardis_actin"] }

[tabs.tomo_mem.tardis_mem_points_in_patch]
name = "Max points in each point cloud"
description = "Divide point cloud into overlapping areas that would be segmented individually and then stitched and predicted together. 1000 points requires ~12 GB of GPU memory. Use 500 or 800 for GPU with less memory. Higher numbers lead to faster inference and slightly improved segmentation"
type = "int"
default = 1000
condition = { arg="method", value=["tardis_mem","tardis_mt","tardis_actin"] }

[tabs.tomo_mem.tardis_filter_by_length]
name = "Minimum length (A)"
description = "All filaments shorter then this length will be deleted"
type = "int"
default = 1000
condition = { arg="method", value=["tardis_mt","tardis_actin"]}

[tabs.tomo_mem.tardis_connect_splines]
name = "Threshold distance between microtubules (A)"
description = "This determines how far apart two microtubules can be, while still being considered as a single unit if they are oriented in the same direction"
type = "int"
default = 2500
condition = { arg="method", value=["tardis_mt","tardis_actin"]}

[tabs.tomo_mem.tardis_connect_cylinder]
name = "Thickness (A)"
description = "Limit search area to a cylindrical radius of the specified size"
type = "int"
default = 250
condition = { arg="method", value=["tardis_mt","tardis_actin"]}

[tabs.tomo_mem.tardis_mem_debug]
name = "Debug mode"
description = "Enable saving of all intermediate files for debugging"
type = "bool"
default = false
condition = { arg="method", value=["tardis_mem","tardis_mt","tardis_actin"] }

[tabs.tomo_mem.preprocessing]
name = "Pre-process tomograms"
description = "Execute reprocessing module"
type = "bool"
default = false
condition = { arg="method", value="membrain" }

[tabs.tomo_mem.pixel]
name = "Pixel size rescaling"
description = "Rescale the tomogram pixel size to this value"
type = "float"
default = 0.0
condition = { arg="preprocessing", value="true" }

[tabs.tomo_mem.match_ps]
name = "Match spectrum"
description = "Match Fourier spectrum amplitude of input tomogram to target"
type = "bool"
default = false
condition = { arg="preprocessing", value="true" }

[tabs.tomo_mem.target]
name = "Target tomogram (*.mrc)"
description = "Target tomogram for matching"
type = "path"
path = { type="files" }
input = { type="initialModel" }
condition = { arg="match_ps", value="true" }

[tabs.tomo_mem.deconvolve]
name = "Deconvolution filter"
description = "Perform deconvolution to enhance tomogram contrast"
type = "bool"
default = false
condition = { arg="preprocessing", value="true" }

[tabs.tomo_mem.deconvolve_strength]
name = "Strength"
description = "Strength parameter for the denoising filter"
type = "float"
default = 1.0
condition = { arg="deconvolve", value="true" }

[tabs.tomo_mem.deconvolve_falloff]
name = "Falloff"
description = "Falloff parameter for the denoising filter"
type = "float"
default = 1.0
condition = { arg="deconvolve", value="true" }

[tabs.tomo_mem.deconvolve_hp_fraction]
name = "High-pass filter fraction"
description = "Fraction of Nyquist frequency to be cut off on the lower end (since it will be boosted the most)"
type = "float"
default = 0.02
condition = { arg="deconvolve", value="true" }

[tabs.tomo_mem.deconvolve_skip_lowpass]
name = "Skip low-pass filter"
description = "Skip low pass that enforces filtering out information beyond the first CTF zero (not recommended)"
type = "bool"
default = false
condition = { arg="deconvolve", value="true" }

[tabs.tomo_mem.model]
name = "Pre-trained model (*.ckpt)"
description = "Available from https://github.com/teamtomo/membrain-seg"
type = "path"
default = "None"
path = { type="files" }
condition = { arg="method", value="membrain" }

[tabs.tomo_mem.rescale_patches]
name = "Rescale patches"
description = "Rescale patches on-the-fly during inference"
type = "bool"
default = false
condition = { arg="method", value="membrain" }

[tabs.tomo_mem.patch_pxl]
name = "Patch pixel size"
description = "Pixel size to which patches will be rescaled internally"
type = "float"
default = 10.0
condition = { arg="rescale_patches", value="true" }

[tabs.tomo_mem.store_probabilities]
name = "Store probabilities"
description = "Output probability maps in addition to segmentation"
type = "bool"
default = false
condition = { arg="method", value="membrain" }

[tabs.tomo_mem.connected_map]
name = "Filter connected components"
description = "Filter segmentation by components"
type = "enum"
enum = { none="none", size="by size", number="by number" }
default = "none"
condition = { arg="method", value=["membrain","tardis_mem"] }

[tabs.tomo_mem.connected_thres]
name = "Size threshold (binned voxels)"
description = "Components smaller than this value will be removed"
type = "int"
default = 0
condition = { arg="connected_map", value="size" }

[tabs.tomo_mem.connected_min_number]
name = "Largest components to ignore"
description = "Number of largest components to ignore"
type = "int"
default = 0
condition = { arg="connected_map", value="number" }

[tabs.tomo_mem.connected_max_number]
name = "Components to keep"
description = "Number of largest components to keep (after the ignored ones)"
type = "int"
default = 1
condition = { arg="connected_map", value="number" }

[tabs.tomo_mem.connected_map_z_thickness]
name = "Thickness of slab to keep (unbinned voxels)"
description = "Only keep connected components whose voxels lie entirely within a central slab of given thickness. -1 for no filtering."
type = "int"
default = -1

[tabs.tomo_mem.augmentation]
name = "Test time augmentation"
description = "Use 8-fold augmentation during testing"
type = "bool"
default = false
condition = { arg="method", value="membrain" }

[tabs.tomo_mem.seg_thres]
name = "Segmentation threshold"
description = "Threshold used in scoremap to increase/decrease segmented membranes"
type = "float"
default = 0.0
condition = { arg="method", value="membrain" }

[tabs.tomo_mem.sliding_wd]
name = "Sliding window size"
description = "Sliding window size used during inference (must be a multiple of 32)"
type = "int"
default = 160
condition = { arg="method", value="membrain" }

[tabs.tomo_mem.use_gpu]
name = "Use GPU"
description = "Use GPU acceleration"
type = "bool"
default = true
condition = { arg="method", value=["membrain","tardis_mem","tardis_mt","tardis_actin"] }

