default = 999

[tabs.relion_refine_expert.auto_ignore_angles]
name = "Auto ignore angles"
description = "In auto-refinement, update angular sampling regardless of changes in orientations for convergence. This makes convergence faster"
type = "bool"
default = false

[tabs.relion_refine_expert.auto_resol_angles]
