[tabs.relion_refine_general]
_name = "General"
_description = "General options"

#====== General options =====
#                             --i () : Input particles (in a star-file)
#                     --tomograms () : Star file with the tomograms, in case subtomos are handled as 2D stacks
#                  --trajectories () : Star file with the tomogram motion trajectories
#                           --ios () : Input tomo optimisation set file. It is used to set --i, --tomograms, --ref or --solvent_mask if they are not provided. Updated output optimiser set is created.
#                             --o () : Output rootname
#                        --iter (-1) : Maximum number of iterations to perform
#                  --tau2_fudge (-1) : Regularisation parameter (values higher than 1 give more weight to the data)
#             --tau2_fudge_scheme () : Tau2 fudge factor updates scheme. Valid values are plain or <deflate>-step. Where <deflate> is the deflate factor during initial stage.
#                            --K (1) : Number of references to be refined
#           --particle_diameter (-1) : Diameter of the circular mask that will be applied to the experimental images (in Angstroms)
#                --zero_mask (false) : Mask surrounding background in particles to zero (by default the solvent area is filled with random noise)
#          --flatten_solvent (false) : Perform masking on the references as well?
#              --solvent_mask (None) : User-provided mask for the references (default is to use spherical mask with particle_diameter)
#             --solvent_mask2 (None) : User-provided secondary mask (with its own average density)
#              --lowpass_mask (None) : User-provided mask for low-pass filtering
#                      --lowpass (0) : User-provided cutoff for region specified above
#                       --tau (None) : STAR file with input tau2-spectrum (to be kept constant)
#            --local_symmetry (None) : Local symmetry description file containing list of masks and their operators
#      --split_random_halves (false) : Refine two random halves of the data completely separately
#       --low_resol_join_halves (-1) : Resolution (in Angstrom) up to which the two random half-reconstructions will not be independent to prevent diverging orientations
#           --center_classes (false) : Re-center classes based on their center-of-mass?

[tabs.relion_refine_general.iter]
name = "Max iterations"
description = "Maximum number of iterations to perform"
type = "int"
default = -1

[tabs.relion_refine_general.tau2_fudge]
name = "Tau2 fudge"
description = "Regularization parameter (values higher than 1 give more weight to the data)"
type = "int"
default = -1

[tabs.relion_refine_general.tau2_fudge_scheme]
name = "Tau2 fudge factor updates scheme"
description = "Valid values are plain or <deflate>-step. Where <deflate> is the deflate factor during initial stage"
type = "str"
default = ""

[tabs.relion_refine_general.k]
name = "Number of classes"
description = "Number of references to be refined"
type = "int"
default = 1

[tabs.relion_refine_general.zero_mask]
name = "Set background to zero"
description = "Mask surrounding background in particles to zero (by default the solvent area is filled with random noise)"
type = "bool"
default = true

[tabs.relion_refine_general.flatten_solvent]
name = "Mask references"
description = "Perform masking on the references as well?"
type = "bool"
default = true

[tabs.relion_refine_general.solvent_mask]
name = "Solvent mask (*.mrc)"
description = "User-provided mask for the references (default is to use spherical mask with particle_diameter)"
type = "path"
path = { type="files" }
input = { type="initialModel" }

[tabs.relion_refine_general.solvent_mask2]
name = "Second solvent mask (*.mrc)"
description = "User-provided mask for low-pass filtering"
type = "path"
path = { type="files" }
input = { type="initialModel" }

[tabs.relion_refine_general.lowpass_mask]
name = "Lowpass mask (*.mrc)"
description = "User-provided secondary mask (with its own average density)"
type = "path"
path = { type="files" }
input = { type="initialModel" }

[tabs.relion_refine_general.lowpass]
name = "Lowpass filter"
description = "User-provided cutoff for region specified above"
type = "float"
default = 0

[tabs.relion_refine_general.tau]
name = "Tau2-spectrum (*.star)"
description = "STAR file with input tau2-spectrum (to be kept constant)"
type = "path"
path = { type="files" }
input = { type="starfile" }

[tabs.relion_refine_general.local_symmetry]
name = "Local symmetry"
description = "Local symmetry description file containing list of masks and their operators"
type = "path"
path = { type="files" }

[tabs.relion_refine_general.split_random_halves]
name = "Split random halves"
description = "Refine two random halves of the data completely separately"
type = "bool"
default = true
hidden = true

[tabs.relion_refine_general.low_resol_join_halves]
name = "Split random halves resolution (A)"
description = "Resolution up to which the two random half-reconstructions will not be independent to prevent diverging orientations"
type = "float"
default = -1

[tabs.relion_refine_general.center_classes]
name = "Re-center classes"
description = "Re-center classes based on their center-of-mass?"
type = "bool"
default = false

