type = "bool"
default = false

[tabs.relion_refine_expert.trust_ref_size]
name = "Trust ref size"
description = "Trust the pixel and box size of the input reference; by default the program will die if these are different from the first optics group of the data"
type = "bool"
default = true

[tabs.relion_refine_expert.nr_parts_sigma2noise]
name = "Nr parts sigma2noise"
description = "Number of particles (per optics group) for initial noise spectra estimation (default 1000 for SPA and 100 for STA)"
type = "int"
default = -1

[tabs.relion_refine_expert.dont_skip_gridding]
