_description = "General options"

#====== Computation =====
#                         --pool (1) : Number of images to pool for each thread task
#                            --j (1) : Number of threads to run in parallel (only useful on multi-core machines)
#  --dont_combine_weights_via_disc (false) : Send the large arrays of summed weights through the MPI network, instead of writing large files to disc
#          --onthefly_shifts (false) : Calculate shifted images on-the-fly, do not store precalculated ones in memory
#      --no_parallel_disc_io (false) : Do NOT let parallel (MPI) processes access the disc simultaneously (use this option with NFS)
#           --preread_images (false) : Use this to let the leader process read all particles into memory. Be careful you have enough RAM for large data sets!
#                   --scratch_dir () : If provided, particle stacks will be copied to this local scratch disk prior to refinement.
#           --keep_free_scratch (10) : Space available for copying particle stacks (in Gb)
#            --reuse_scratch (false) : Re-use data on scratchdir, instead of wiping it and re-copying all data.
#             --keep_scratch (false) : Don't remove scratch after convergence. Following jobs that use EXACTLY the same particles should use --reuse_scratch.
#             --fast_subsets (false) : Use faster optimisation by using subsets of the data in the first 15 iterations
#                      --gpu (false) : Use available gpu resources for some calculations
#              --free_gpu_memory (0) : GPU device memory (in Mb) to leave free after allocation.

[tabs.relion_refine_computation.pool]
name = "Pool"
description = "Number of images to pool for each thread task"
type = "int"
default = 1

[tabs.relion_refine_computation.j]
name = "J"
description = "Number of threads to run in parallel (only useful on multi-core machines)"
type = "int"
default = 2

[tabs.relion_refine_computation.dont_combine_weights_via_disc]
name = "Dont combine weights via disc"
description = "Send the large arrays of summed weights through the MPI network, instead of writing large files to disc"
type = "bool"
default = false

[tabs.relion_refine_computation.onthefly_shifts]
name = "On-the-fly shifts"
description = "Calculate shifted images on-the-fly, do not store precalculated ones in memory"
type = "bool"
default = false

[tabs.relion_refine_computation.no_parallel_disc_io]
name = "No parallel disc IO"
description = "Do NOT let parallel (MPI) processes access the disc simultaneously (use this option with NFS)"
type = "bool"
default = false

[tabs.relion_refine_computation.preread_images]
name = "Pre-read images"
description = "Use this to let the leader process read all particles into memory. Be careful you have enough RAM for large data sets!"
type = "bool"
default = false

[tabs.relion_refine_computation.scratch_dir]
name = "Scratch dir"
description = "If provided, particle stacks will be copied to this local scratch disk prior to refinement"
type = "str"
default = ""

[tabs.relion_refine_computation.keep_free_scratch]
name = "Keep free scratch"
description = "Space available for copying particle stacks (in Gb)"
type = "int"
default = 10

[tabs.relion_refine_computation.reuse_scratch]
name = "Reuse scratch"
description = "Re-use data on scratchdir, instead of wiping it and re-copying all data"
type = "bool"
default = false

[tabs.relion_refine_computation.keep_scratch]
name = "Keep scratch"
description = "Don't remove scratch after convergence. Following jobs that use EXACTLY the same particles should use --reuse_scratch"
type = "bool"
default = false

[tabs.relion_refine_computation.fast_subsets]
name = "Fast subsets"
description = "Use faster optimisation by using subsets of the data in the first 15 iterations"
type = "bool"
default = false

[tabs.relion_refine_computation.gpu]
name = "Use GPU"
description = "Use available gpu resources for some calculations"
type = "bool"
default = false

[tabs.relion_refine_computation.free_gpu_memory]
name = "Free GPU memory"
description = "GPU device memory (in Mb) to leave free after allocation"
type = "int"
default = 0

[tabs.relion_refine_expert]
_name = "Expert options"
_description = "Expert options"

#====== Expert options =====
#                          --pad (2) : Oversampling factor for the Fourier transforms of the references
#                 --ref_angpix (-1.) : Pixel size (in A) for the input reference (default is to read from header)
#                       --NN (false) : Perform nearest-neighbour instead of linear Fourier-space interpolation?
#                    --r_min_nn (10) : Minimum number of Fourier shells to perform linear Fourier-space interpolation
#                         --verb (1) : Verbosity (1=normal, 0=silent)
#                 --random_seed (-1) : Number for the random seed generator
#                 --coarse_size (-1) : Maximum image size for the first pass of the adaptive sampling approach
#        --adaptive_fraction (0.999) : Fraction of the weights to be considered in the first pass of adaptive oversampling
#                     --maskedge (5) : Width of the soft edge of the spherical mask (in pixels)
#          --fix_sigma_noise (false) : Fix the experimental noise spectra?
#         --fix_sigma_offset (false) : Fix the stddev in the origin offsets?
#                   --incr_size (10) : Number of Fourier shells beyond the current resolution to be included in refinement
#    --print_metadata_labels (false) : Print a table with definitions of all metadata labels, and exit
#       --print_symmetry_ops (false) : Print all symmetry transformation matrices, and exit
#          --strict_highres_exp (-1) : High resolution limit (in Angstrom) to restrict probability calculations in the expectation step
#           --strict_lowres_exp (-1) : Low resolution limit (in Angstrom) to restrict probability calculations in the expectation step
#          --dont_check_norm (false) : Skip the check whether the images are normalised correctly
#                --always_cc (false) : Perform CC-calculation in all iterations (useful for faster denovo model generation?)
#      --solvent_correct_fsc (false) : Correct FSC curve for the effects of the solvent mask?
#            --skip_maximize (false) : Skip maximization step (only write out data.star file)?
#          --failsafe_threshold (40) : Maximum number of particles permitted to be handled by fail-safe mode, due to zero sum of weights, before exiting with an error (GPU only).
#                    --blush (false) : Perform the reconstruction with the Blush algorithm.
#  --blush_skip_spectral_trailing (false) : Skip spectral trailing during Blush reconstruction (WARNING: This may inflate resolution estimates)
#     --external_reconstruct (false) : Perform the reconstruction step outside relion_refine, e.g. for learned priors?)
#              --auto_iter_max (999) : In auto-refinement, stop at this iteration.
#       --auto_ignore_angles (false) : In auto-refinement, update angular sampling regardless of changes in orientations for convergence. This makes convergence faster.
#        --auto_resol_angles (false) : In auto-refinement, update angular sampling based on resolution-based required sampling. This makes convergence faster.
#   --allow_coarser_sampling (false) : In 2D/3D classification, allow coarser angular and translational samplings if accuracies are bad (typically in earlier iterations.
#           --trust_ref_size (false) : Trust the pixel and box size of the input reference; by default the program will die if these are different from the first optics group of the data
#        --nr_parts_sigma2noise (-1) : Number of particles (per optics group) for initial noise spectra estimation (default 1000 for SPA and 100 for STA).
#       --dont_skip_gridding (false) : Perform gridding in the reconstruction step (obsolete?)
#====== MPI options =====
#   --halt_all_followers_except (-1) : For debugging: keep all followers except this one waiting
#  --keep_debug_reconstruct_files (false) : For debugging: keep temporary data and weight files for debug-reconstructions.
#                          --version : Print RELION version and exit

[tabs.relion_refine_expert.pad]
name = "Pad"
description = "Oversampling factor for the Fourier transforms of the references"
type = "int"
default = 2

[tabs.relion_refine_expert.ref_angpix]
name = "Ref angpix (A)"
description = "Pixel size for the input reference (default is to read from header)"
type = "float"
default = -1.0

[tabs.relion_refine_expert.nn]
name = "Nearest-neighbour interpolation"
description = "Perform nearest-neighbour instead of linear Fourier-space interpolation?"
type = "bool"
default = false

[tabs.relion_refine_expert.r_min_nn]
name = "R min NN"
description = "Minimum number of Fourier shells to perform linear Fourier-space interpolation"
type = "int"
default = 10

[tabs.relion_refine_expert.random_seed]
name = "Random seed"
description = "Number for the random seed generator"
type = "int"
default = -1

[tabs.relion_refine_expert.coarse_size]
name = "Coarse size"
description = "Maximum image size for the first pass of the adaptive sampling approach"
type = "int"
default = -1

[tabs.relion_refine_expert.adaptive_fraction]
name = "Adaptive fraction"
description = "Fraction of the weights to be considered in the first pass of adaptive oversampling"
type = "float"
default = 0.999

[tabs.relion_refine_expert.maskedge]
name = "Maskedge (pixels)"
description = "Width of the soft edge of the spherical mask"
type = "int"
default = 5

[tabs.relion_refine_expert.fix_sigma_noise]
name = "Fix sigma noise"
description = "Fix the experimental noise spectra?"
type = "bool"
default = false

[tabs.relion_refine_expert.fix_sigma_offset]
name = "Fix sigma offset"
description = "Fix the stddev in the origin offsets?"
type = "bool"
default = false

[tabs.relion_refine_expert.incr_size]
name = "Incr size"
description = "Number of Fourier shells beyond the current resolution to be included in refinement"
type = "int"
default = 10

[tabs.relion_refine_expert.print_metadata_labels]
name = "Print metadata labels"
description = "Print a table with definitions of all metadata labels, and exit"
type = "bool"
default = false
hidden = true

[tabs.relion_refine_expert.print_symmetry_ops]
name = "Print symmetry ops"
description = "Print all symmetry transformation matrices, and exit"
type = "bool"
default = false
hidden = true

[tabs.relion_refine_expert.strict_highres_exp]
name = "Strict highres exp (A)"
description = "High resolution limit to restrict probability calculations in the expectation step"
type = "float"
default = -1.0

[tabs.relion_refine_expert.strict_lowres_exp]
name = "Strict lowres exp (A)"
description = "Low resolution limit to restrict probability calculations in the expectation step"
type = "float"
default = -1.0

[tabs.relion_refine_expert.dont_check_norm]
name = "Don't check norm"
description = "Skip the check whether the images are normalised correctly"
type = "bool"
default = false

[tabs.relion_refine_expert.always_cc]
name = "Always CC"
description = "Perform CC-calculation in all iterations (useful for faster denovo model generation)?"
type = "bool"
default = false

[tabs.relion_refine_expert.solvent_correct_fsc]
name = "Solvent correct FSC"
description = "Correct FSC curve for the effects of the solvent mask?"
type = "bool"
default = false

[tabs.relion_refine_expert.skip_maximize]
name = "Skip maximize"
description = "Skip maximization step (only write out data.star file)?"
type = "bool"
default = false

[tabs.relion_refine_expert.failsafe_threshold]
name = "Failsafe threshold"
description = "Maximum number of particles permitted to be handled by fail-safe mode, due to zero sum of weights, before exiting with an error (GPU only)"
type = "int"
default = 40

[tabs.relion_refine_expert.blush]
name = "Blush"
description = "Perform the reconstruction with the Blush algorithm"
type = "bool"
default = false
hidden = true

[tabs.relion_refine_expert.blush_skip_spectral_trailing]
name = "Blush skip spectral trailing"
description = "Skip spectral trailing during Blush reconstruction (WARNING: This may inflate resolution estimates)"
type = "bool"
default = false
condition = { arg="blush", value="true" }

[tabs.relion_refine_expert.external_reconstruct]
name = "External reconstruct"
description = "Perform the reconstruction step outside relion_refine, e.g. for learned priors?"
type = "bool"
default = false

[tabs.relion_refine_expert.auto_iter_max]
name = "Auto iter max"
description = "In auto-refinement, stop at this iteration"
